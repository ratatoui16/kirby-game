<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minesweeper 12x12</title>
<style>
  body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    background: #f4f4f4;
  }
  h1 { margin-bottom: 10px; }
  #board {
    display: grid;
    grid-template-columns: repeat(12, 30px);
    grid-template-rows: repeat(12, 30px);
    gap: 2px;
  }
  .cell {
    width: 30px;
    height: 30px;
    background: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
  }
  .revealed {
    background: #eee;
    cursor: default;
  }
  .mine {
    background: red;
  }
  #status {
    margin: 10px;
    font-size: 18px;
  }
  button {
    margin-bottom: 10px;
    padding: 6px 12px;
  }
</style>
</head>
<body>
<h1>Minesweeper (12x12)</h1>
<button onclick="initGame()">Restart</button>
<div id="status"></div>
<div id="board"></div>

<script>
const size = 12;
const mineCount = 25;
let board = [];
let revealed = [];
let gameOver = false;

function initGame() {
  board = [];
  revealed = [];
  gameOver = false;
  document.getElementById('status').textContent = '';

  // create empty board
  for (let r = 0; r < size; r++) {
    board[r] = [];
    revealed[r] = [];
    for (let c = 0; c < size; c++) {
      board[r][c] = { mine: false, count: 0 };
      revealed[r][c] = false;
    }
  }

  // place mines
  let placed = 0;
  while (placed < mineCount) {
    let r = Math.floor(Math.random() * size);
    let c = Math.floor(Math.random() * size);
    if (!board[r][c].mine) {
      board[r][c].mine = true;
      placed++;
    }
  }

  // calculate numbers
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c].mine) continue;
      let count = 0;
      for (let i = -1; i <= 1; i++) {
        for (let j = -1; j <= 1; j++) {
          let nr = r + i, nc = c + j;
          if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
            if (board[nr][nc].mine) count++;
          }
        }
      }
      board[r][c].count = count;
    }
  }

  render();
}

function render() {
  const boardDiv = document.getElementById('board');
  boardDiv.innerHTML = '';

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (board[r][c].mine) {
          cell.classList.add('mine');
          cell.textContent = '💣';
        } else if (board[r][c].count > 0) {
          cell.textContent = board[r][c].count;
        }
      }

      cell.addEventListener('click', () => reveal(r, c));
      boardDiv.appendChild(cell);
    }
  }
}

function reveal(r, c) {
  if (gameOver || revealed[r][c]) return;

  revealed[r][c] = true;

  if (board[r][c].mine) {
    gameOver = true;
    document.getElementById('status').textContent = 'Game Over!';
    revealAllMines();
    render();
    return;
  }

  if (board[r][c].count === 0) {
    floodFill(r, c);
  }

  checkWin();
  render();
}

function floodFill(r, c) {
  for (let i = -1; i <= 1; i++) {
    for (let j = -1; j <= 1; j++) {
      let nr = r + i, nc = c + j;
      if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
        if (!revealed[nr][nc] && !board[nr][nc].mine) {
          revealed[nr][nc] = true;
          if (board[nr][nc].count === 0) {
            floodFill(nr, nc);
          }
        }
      }
    }
  }
}

function revealAllMines() {
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c].mine) {
        revealed[r][c] = true;
      }
    }
  }
}

function checkWin() {
  let safeCells = 0;
  let revealedSafe = 0;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!board[r][c].mine) {
        safeCells++;
        if (revealed[r][c]) revealedSafe++;
      }
    }
  }

  if (revealedSafe === safeCells) {
    gameOver = true;
    document.getElementById('status').textContent = 'You Win!';
  }
}

initGame();
</script>
</body>
</html>
